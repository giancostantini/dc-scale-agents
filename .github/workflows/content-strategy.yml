name: Content Strategy

on:
  # schedule deshabilitado hasta que haya clientes reales cargados via dashboard.
  # Reactivar cuando exista al menos un cliente en la tabla `clients` de Supabase.
  # schedule:
  #   - cron: '0 11 * * 1'  # lunes 11:00 UTC = 8 AM Uruguay
  workflow_dispatch:
    inputs:
      client:
        description: 'Client slug'
        required: true

  repository_dispatch:
    types: [content-strategy]

jobs:
  strategy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Content Strategy Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJson(github.event.client_payload.brief) }}' > /tmp/brief.json
            node scripts/content-strategy/index.js --brief /tmp/brief.json
          else
            node scripts/content-strategy/index.js "${{ inputs.client }}"
          fi

      - name: Commit calendar and briefs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault/clients/*/content-calendar.md vault/clients/*/content-briefs/ vault/clients/*/agent-reports/
          git diff --staged --quiet || git commit -m "Content Strategy: calendar + briefs — $(date +%Y-%m-%d)"
          git push
