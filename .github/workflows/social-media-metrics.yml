name: Social Media Metrics Agent

on:
  # schedule deshabilitado hasta que haya clientes reales cargados via dashboard.
  # Reactivar cuando exista al menos un cliente en la tabla `clients` de Supabase.
  # schedule:
  #   - cron: '0 23 * * *'   # daily 23:00 UTC — daily report
  #   - cron: '0 0 * * 1'    # Monday 00:00 UTC — weekly report

  workflow_dispatch:
    inputs:
      client:
        description: 'Client slug'
        required: true
      mode:
        description: 'Mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
      lookback_days:
        description: 'How many days back to analyze (default: 1 for daily, 7 for weekly)'
        required: false
      instructions:
        description: 'Additional instructions (free text)'
        required: false

  # Consultant Agent or Dashboard can trigger via API
  repository_dispatch:
    types: [social-media-metrics]

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ensure directories exist
        run: |
          CLIENT="${{ inputs.client || github.event.client_payload.brief.client }}"
          if [ -z "$CLIENT" ]; then
            echo "::error::client slug missing from inputs and dispatch payload"
            exit 1
          fi
          mkdir -p "vault/clients/${CLIENT}/agent-reports"

      - name: Determine mode
        id: mode
        run: |
          echo "value=${{ inputs.mode || 'daily' }}" >> $GITHUB_OUTPUT

      - name: Collect and analyze metrics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJson(github.event.client_payload.brief) }}' > /tmp/brief.json
            node scripts/social-media-metrics/index.js --brief /tmp/brief.json
          else
            cat > /tmp/brief.json << BRIEF_EOF
          {
            "client": "${{ inputs.client }}",
            "mode": "${{ steps.mode.outputs.value }}",
            "source": "dashboard",
            "lookbackDays": ${{ inputs.lookback_days || 'null' }},
            "instructions": "${{ inputs.instructions }}"
          }
          BRIEF_EOF
            node scripts/social-media-metrics/index.js --brief /tmp/brief.json
          fi

      - name: Commit metrics updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault/
          git diff --cached --quiet || git commit -m "Metrics Agent: ${{ steps.mode.outputs.value }} report for ${{ inputs.client || github.event.client_payload.brief.client }}"
          git push
