name: Analytics Agent (Reporting Performance)

on:
  schedule:
    # Daily pulse: every day 9 AM Montevideo (12:00 UTC)
    - cron: '0 12 * * *'
    # Weekly: Monday 8 AM Montevideo (11:00 UTC)
    - cron: '0 11 * * 1'
    # Monthly: 1st of month 9 AM Montevideo (12:00 UTC)
    - cron: '0 12 1 * *'

  workflow_dispatch:
    inputs:
      client:
        description: 'Client slug (e.g. dmancuello)'
        required: true
        default: 'dmancuello'
      mode:
        description: 'Mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - biweekly
          - monthly
          - insights
          - custom
          - query
      business_type:
        description: 'Business type (affects KPI selection)'
        required: false
        type: choice
        options:
          - ecommerce
          - services
          - physical-retail
          - saas
          - it-services
        default: 'ecommerce'
      lookback_days:
        description: 'Days to analyze (leave empty for mode default)'
        required: false
      question:
        description: 'Natural language question (only for mode=query)'
        required: false
      instructions:
        description: 'Additional instructions / custom report description (free text)'
        required: false

  repository_dispatch:
    types: [reporting-performance, analytics]

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ensure directories exist
        run: |
          CLIENT="${{ inputs.client || github.event.client_payload.brief.client || 'dmancuello' }}"
          mkdir -p "vault/clients/${CLIENT}/agent-reports"

      - name: Determine mode from schedule
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DAY=$(date -u +%d)
            DOW=$(date -u +%u)
            HOUR=$(date -u +%H)
            # Monthly on day 1 at 12 UTC
            if [ "$DAY" = "01" ] && [ "$HOUR" = "12" ]; then
              echo "mode=monthly" >> $GITHUB_OUTPUT
            # Weekly on Monday (DOW=1) at 11 UTC
            elif [ "$DOW" = "1" ] && [ "$HOUR" = "11" ]; then
              echo "mode=weekly" >> $GITHUB_OUTPUT
            else
              # Default to daily
              echo "mode=daily" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run Analytics Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJson(github.event.client_payload.brief) }}' > /tmp/brief.json
            node scripts/reporting-performance/index.js --brief /tmp/brief.json
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            cat > /tmp/brief.json << BRIEF_EOF
          {
            "client": "dmancuello",
            "mode": "${{ steps.mode.outputs.mode }}",
            "source": "github-actions",
            "businessType": "ecommerce"
          }
          BRIEF_EOF
            node scripts/reporting-performance/index.js --brief /tmp/brief.json
          else
            cat > /tmp/brief.json << BRIEF_EOF
          {
            "client": "${{ inputs.client }}",
            "mode": "${{ inputs.mode }}",
            "source": "dashboard",
            "businessType": "${{ inputs.business_type || 'ecommerce' }}",
            "lookbackDays": ${{ inputs.lookback_days || 'null' }},
            "question": "${{ inputs.question }}",
            "instructions": "${{ inputs.instructions }}"
          }
          BRIEF_EOF
            node scripts/reporting-performance/index.js --brief /tmp/brief.json
          fi

      - name: Commit vault updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault/
          git diff --cached --quiet || git commit -m "Analytics Agent: ${{ inputs.mode || steps.mode.outputs.mode || github.event.client_payload.brief.mode || 'daily' }} for ${{ inputs.client || github.event.client_payload.brief.client || 'dmancuello' }}"
          git push
