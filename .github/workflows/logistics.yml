name: Logistics Agent

on:
  # schedule deshabilitado hasta que haya clientes reales cargados via dashboard.
  # Reactivar cuando exista al menos un cliente en la tabla `clients` de Supabase.
  # schedule:
  #   - cron: '0 11 * * 1-5'  # weekdays 11:00 UTC — schedule mode
  #   - cron: '0 21 * * 5'    # Friday 21:00 UTC — report mode

  workflow_dispatch:
    inputs:
      client:
        description: 'Client slug'
        required: true
      mode:
        description: 'Mode'
        required: true
        default: 'schedule'
        type: choice
        options:
          - schedule
          - dispatch
          - optimize
          - report
      shipping_company:
        description: 'Preferred carrier (optional)'
        required: false
      trigger_stock_check:
        description: 'Trigger Stock Agent after dispatch'
        required: false
        type: boolean
        default: false
      lookback_days:
        description: 'Days to analyze (default varies by mode)'
        required: false
      instructions:
        description: 'Additional instructions (free text)'
        required: false

  repository_dispatch:
    types: [logistics]

jobs:
  run-logistics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ensure directories exist
        run: |
          CLIENT="${{ inputs.client || github.event.client_payload.brief.client }}"
          if [ -z "$CLIENT" ]; then
            echo "::error::client slug missing from inputs and dispatch payload"
            exit 1
          fi
          mkdir -p "vault/clients/${CLIENT}/agent-reports"

      - name: Run Logistics Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJson(github.event.client_payload.brief) }}' > /tmp/brief.json
            node scripts/logistics/index.js --brief /tmp/brief.json
          else
            cat > /tmp/brief.json << BRIEF_EOF
          {
            "client": "${{ inputs.client }}",
            "mode": "${{ inputs.mode }}",
            "source": "dashboard",
            "shippingCompany": "${{ inputs.shipping_company }}",
            "triggerStockCheck": ${{ inputs.trigger_stock_check || 'false' }},
            "lookbackDays": ${{ inputs.lookback_days || 'null' }},
            "instructions": "${{ inputs.instructions }}"
          }
          BRIEF_EOF
            node scripts/logistics/index.js --brief /tmp/brief.json
          fi

      - name: Commit vault updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault/
          git diff --cached --quiet || git commit -m "Logistics Agent: ${{ inputs.mode || github.event.client_payload.brief.mode || 'dispatch' }} for ${{ inputs.client || github.event.client_payload.brief.client }}"
          git push
