name: SEO Agent

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client slug'
        required: true
      piece_type:
        description: 'Piece type: blog-post | keyword-research | product-meta | category-meta | content-brief'
        required: true
        default: 'blog-post'
        type: choice
        options:
          - blog-post
          - keyword-research
          - product-meta
          - category-meta
          - content-brief

  repository_dispatch:
    types: [seo]

jobs:
  generate-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate SEO piece
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJson(github.event.client_payload.brief) }}' > /tmp/brief.json
            node scripts/seo/index.js --brief /tmp/brief.json
          else
            node scripts/seo/index.js ${{ inputs.client }} ${{ inputs.piece_type }}
          fi

      - name: Commit seo-library update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault/clients/${{ inputs.client }}/seo-library.md
          git add vault/agents/seo/keyword-database.md
          git diff --cached --quiet || git commit -m "SEO Agent: new ${{ inputs.piece_type }} for ${{ inputs.client }}"
          git push
