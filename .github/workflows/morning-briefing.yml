name: Morning Briefing — DMancuello

on:
  schedule:
    # Todos los dias a las 10:00 UTC (7:00 AM Uruguay)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      client:
        description: 'Client slug'
        required: false
        default: 'dmancuello'

  repository_dispatch:
    types: [morning-briefing]

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Morning Briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJson(github.event.client_payload.brief) }}' > /tmp/brief.json
            node scripts/morning-briefing/index.js --brief /tmp/brief.json
          else
            node scripts/morning-briefing/index.js ${{ inputs.client || 'dmancuello' }}
          fi
