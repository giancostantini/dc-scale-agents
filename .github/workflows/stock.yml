name: Stock Agent

on:
  # schedule deshabilitado hasta que haya clientes reales cargados via dashboard.
  # Reactivar cuando exista al menos un cliente en la tabla `clients` de Supabase.
  # schedule:
  #   - cron: '0 12 * * *'   # daily 12:00 UTC — alert mode
  #   - cron: '0 23 * * 0'   # Sunday 23:00 UTC — report mode

  workflow_dispatch:
    inputs:
      client:
        description: 'Client slug'
        required: true
      mode:
        description: 'Mode'
        required: true
        default: 'status'
        type: choice
        options:
          - status
          - forecast
          - alert
          - report
      products:
        description: 'Comma-separated SKUs (leave empty for all)'
        required: false
      lookback_days:
        description: 'Days of sales history for velocity (default: 30)'
        required: false
      safety_stock_days:
        description: 'Buffer stock days (default: 3)'
        required: false
      alert_threshold:
        description: 'Alert threshold'
        required: false
        type: choice
        options:
          - ''
          - critical
          - warning
          - all
      instructions:
        description: 'Additional instructions (free text)'
        required: false

  repository_dispatch:
    types: [stock]

jobs:
  run-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ensure directories exist
        run: |
          CLIENT="${{ inputs.client || github.event.client_payload.brief.client }}"
          if [ -z "$CLIENT" ]; then
            echo "::error::client slug missing from inputs and dispatch payload"
            exit 1
          fi
          mkdir -p "vault/clients/${CLIENT}/agent-reports"

      - name: Run Stock Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJson(github.event.client_payload.brief) }}' > /tmp/brief.json
            node scripts/stock/index.js --brief /tmp/brief.json
          else
            cat > /tmp/brief.json << BRIEF_EOF
          {
            "client": "${{ inputs.client }}",
            "mode": "${{ inputs.mode }}",
            "source": "dashboard",
            "lookbackDays": ${{ inputs.lookback_days || 'null' }},
            "safetyStockDays": ${{ inputs.safety_stock_days || 'null' }},
            "alertThreshold": "${{ inputs.alert_threshold }}",
            "instructions": "${{ inputs.instructions }}"
          }
          BRIEF_EOF
            node scripts/stock/index.js --brief /tmp/brief.json
          fi

      - name: Commit vault updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault/
          git diff --cached --quiet || git commit -m "Stock Agent: ${{ inputs.mode || github.event.client_payload.brief.mode || 'dispatch' }} for ${{ inputs.client || github.event.client_payload.brief.client }}"
          git push
