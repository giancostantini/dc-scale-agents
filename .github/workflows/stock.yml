name: Stock Agent

on:
  schedule:
    # Daily alert check at 9 AM Montevideo (12:00 UTC)
    - cron: '0 12 * * *'
    # Weekly report: Sunday 8 PM Montevideo (23:00 UTC)
    - cron: '0 23 * * 0'

  workflow_dispatch:
    inputs:
      client:
        description: 'Client slug (e.g. dmancuello)'
        required: true
        default: 'dmancuello'
      mode:
        description: 'Mode'
        required: true
        default: 'status'
        type: choice
        options:
          - status
          - forecast
          - alert
          - report
      products:
        description: 'Comma-separated SKUs (leave empty for all)'
        required: false
      lookback_days:
        description: 'Days of sales history for velocity (default: 30)'
        required: false
      safety_stock_days:
        description: 'Buffer stock days (default: 3)'
        required: false
      alert_threshold:
        description: 'Alert threshold'
        required: false
        type: choice
        options:
          - ''
          - critical
          - warning
          - all
      instructions:
        description: 'Additional instructions (free text)'
        required: false

  repository_dispatch:
    types: [stock]

jobs:
  run-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ensure directories exist
        run: |
          CLIENT="${{ inputs.client || github.event.client_payload.brief.client || 'dmancuello' }}"
          mkdir -p "vault/clients/${CLIENT}/agent-reports"

      - name: Determine mode from schedule
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            DAY=$(date -u +%u)
            if [ "$DAY" = "7" ] && [ "$HOUR" = "23" ]; then
              echo "mode=report" >> $GITHUB_OUTPUT
            else
              echo "mode=alert" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run Stock Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJson(github.event.client_payload.brief) }}' > /tmp/brief.json
            node scripts/stock/index.js --brief /tmp/brief.json
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            cat > /tmp/brief.json << BRIEF_EOF
          {
            "client": "dmancuello",
            "mode": "${{ steps.mode.outputs.mode }}",
            "source": "github-actions"
          }
          BRIEF_EOF
            node scripts/stock/index.js --brief /tmp/brief.json
          else
            cat > /tmp/brief.json << BRIEF_EOF
          {
            "client": "${{ inputs.client }}",
            "mode": "${{ inputs.mode }}",
            "source": "dashboard",
            "lookbackDays": ${{ inputs.lookback_days || 'null' }},
            "safetyStockDays": ${{ inputs.safety_stock_days || 'null' }},
            "alertThreshold": "${{ inputs.alert_threshold }}",
            "instructions": "${{ inputs.instructions }}"
          }
          BRIEF_EOF
            node scripts/stock/index.js --brief /tmp/brief.json
          fi

      - name: Commit vault updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault/
          git diff --cached --quiet || git commit -m "Stock Agent: ${{ inputs.mode || steps.mode.outputs.mode || github.event.client_payload.brief.mode || 'alert' }} for ${{ inputs.client || github.event.client_payload.brief.client || 'dmancuello' }}"
          git push
