name: Meta Ads Agent

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client slug (e.g. dmancuello)'
        required: true
        default: 'dmancuello'
      mode:
        description: 'Mode'
        required: true
        default: 'audit'
        type: choice
        options:
          - audit
          - create
          - optimize
          - report
          - toggle
      campaign_objective:
        description: 'Campaign objective (for create mode)'
        required: false
        type: choice
        options:
          - ''
          - sales
          - traffic
          - leads
          - awareness
          - engagement
      campaign_name:
        description: 'Campaign name (for create/toggle)'
        required: false
      toggle_action:
        description: 'Toggle action (for toggle mode)'
        required: false
        type: choice
        options:
          - ''
          - activate
          - deactivate
      daily_budget:
        description: 'Daily budget in USD (for create mode)'
        required: false
      roas_target:
        description: 'Target ROAS (e.g. 3.0)'
        required: false
      target_audience:
        description: 'Target audience description'
        required: false
      request_creative:
        description: 'Request creative from Content Creator'
        required: false
        type: boolean
        default: false
      creative_type:
        description: 'Creative type to request'
        required: false
        type: choice
        options:
          - ''
          - static-ad
          - headline-ad
          - collage-ad
          - reel
      lookback_days:
        description: 'Days to analyze (default: 7)'
        required: false
      instructions:
        description: 'Additional instructions (free text)'
        required: false

  # Consultant Agent or Dashboard can trigger via API
  repository_dispatch:
    types: [meta-ads]

jobs:
  run-meta-ads:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ensure directories exist
        run: |
          CLIENT="${{ inputs.client || github.event.client_payload.brief.client || 'dmancuello' }}"
          mkdir -p "vault/clients/${CLIENT}/agent-reports"
          mkdir -p "vault/clients/${CLIENT}/content-briefs"

      - name: Run Meta Ads Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJson(github.event.client_payload.brief) }}' > /tmp/brief.json
            node scripts/meta-ads/index.js --brief /tmp/brief.json
          else
            CLIENT="${{ inputs.client }}"
            MODE="${{ inputs.mode }}"

            cat > /tmp/brief.json << BRIEF_EOF
          {
            "client": "${CLIENT}",
            "mode": "${MODE}",
            "source": "dashboard",
            "campaignObjective": "${{ inputs.campaign_objective }}",
            "campaignName": "${{ inputs.campaign_name }}",
            "toggleAction": "${{ inputs.toggle_action }}",
            "dailyBudget": ${{ inputs.daily_budget || 'null' }},
            "roasTarget": ${{ inputs.roas_target || 'null' }},
            "targetAudience": "${{ inputs.target_audience }}",
            "requestCreative": ${{ inputs.request_creative || 'false' }},
            "creativeType": "${{ inputs.creative_type }}",
            "lookbackDays": ${{ inputs.lookback_days || 'null' }},
            "instructions": "${{ inputs.instructions }}"
          }
          BRIEF_EOF
            node scripts/meta-ads/index.js --brief /tmp/brief.json
          fi

      - name: Commit vault updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault/
          git diff --cached --quiet || git commit -m "Meta Ads Agent: ${{ inputs.mode || github.event.client_payload.brief.mode || 'audit' }} for ${{ inputs.client || github.event.client_payload.brief.client || 'dmancuello' }}"
          git push
